    type: string
    title: Title 
    description: "Title of the drupak section. Plain text."
  subtitle:
    type: string
    title: Subtitle
    description: "Subtitle of the drupak section. Plain text."
  date:
    type: string
    title: Date
    description: "Date of the drupak section. Plain text."
  link:
    type: string
    title: Link
    description: "Link content for the drupal services section. Plain text."