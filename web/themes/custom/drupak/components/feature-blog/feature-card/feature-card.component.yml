$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Feature card drupak component
status: stable
description: "Feature card component with title, description and image."
group: Drupak
props:
  type: object
  properties:
    image:
      type: string
      title: Drupak Image 
      description: "URL of the drupak logo image."
slots:
