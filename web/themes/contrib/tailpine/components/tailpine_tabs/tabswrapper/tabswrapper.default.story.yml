name: Tabswrapper - Underline Style
description: Full tab wrapper with underline style tabs and rich content

props:
  firstTabTitle: 'overview'

slots:
  tabTitleContent: |
    <button
      type="button"
      x-on:click="activeTab = 'overview'"
      x-bind:class="activeTab === 'overview' ? 'border-b-2 border-primary text-primary' : ''"
      class="border-b-2 border-body-bg w-1/3 py-3 text-body font-bold transition-all duration-200"
      role="tab"
    >
      Overview
    </button>
    <button
      type="button"
      x-on:click="activeTab = 'features'"
      x-bind:class="activeTab === 'features' ? 'border-b-2 border-primary text-primary' : ''"
      class="border-b-2 border-body-bg w-1/3 py-3 text-body font-bold transition-all duration-200"
      role="tab"
    >
      Features
    </button>
    <button
      type="button"
      x-on:click="activeTab = 'pricing'"
      x-bind:class="activeTab === 'pricing' ? 'border-b-2 border-primary text-primary' : ''"
      class="border-b-2 border-body-bg w-1/3 py-3 text-body font-bold transition-all duration-200"
      role="tab"
    >
      Pricing
    </button>

  tabContents: |
    <div 
      x-show="activeTab === 'overview'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      role="tabpanel"
      class="tab-panel"
    >
      <div class="space-y-4">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Welcome to Our Platform</h2>
        <p class="text-gray-700 dark:text-gray-300 leading-relaxed">Discover a comprehensive solution designed to streamline your workflow and boost productivity. Our platform combines powerful features with an intuitive interface to help you achieve your goals faster.</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
          <div class="p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm">
            <h3 class="font-semibold text-lg mb-2 text-gray-900 dark:text-gray-100">Easy Integration</h3>
            <p class="text-sm text-gray-600 dark:text-gray-400">Connect seamlessly with your existing tools and workflows in minutes.</p>
          </div>
          <div class="p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm">
            <h3 class="font-semibold text-lg mb-2 text-gray-900 dark:text-gray-100">Real-time Analytics</h3>
            <p class="text-sm text-gray-600 dark:text-gray-400">Monitor your performance with live dashboards and detailed insights.</p>
          </div>
        </div>
      </div>
    </div>
    <div 
      x-show="activeTab === 'features'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      role="tabpanel"
      class="tab-panel"
    >
      <div class="space-y-4">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Key Features</h2>
        <ul class="space-y-3">
          <li class="flex items-start gap-3">
            <svg class="w-6 h-6 text-primary flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <div>
              <h3 class="font-semibold text-gray-900 dark:text-gray-100">Advanced Automation</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400">Automate repetitive tasks and focus on what matters most.</p>
            </div>
          </li>
          <li class="flex items-start gap-3">
            <svg class="w-6 h-6 text-primary flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <div>
              <h3 class="font-semibold text-gray-900 dark:text-gray-100">Collaborative Workspace</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400">Work together with your team in real-time from anywhere.</p>
            </div>
          </li>
        </ul>
      </div>
    </div>
    <div 
      x-show="activeTab === 'pricing'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      role="tabpanel"
      class="tab-panel"
    >
      <div class="space-y-4">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Simple, Transparent Pricing</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
          <div class="p-6 bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700">
            <h3 class="text-xl font-bold mb-2 text-gray-900 dark:text-gray-100">Starter</h3>
            <div class="text-3xl font-bold mb-4 text-gray-900 dark:text-gray-100">$29<span class="text-sm font-normal text-gray-600 dark:text-gray-400">/month</span></div>
            <ul class="space-y-2 text-sm text-gray-600 dark:text-gray-400">
              <li>✓ Up to 5 team members</li>
              <li>✓ 10 GB storage</li>
              <li>✓ Basic analytics</li>
            </ul>
          </div>
          <div class="p-6 bg-primary text-white border-2 border-primary">
            <h3 class="text-xl font-bold mb-2">Professional</h3>
            <div class="text-3xl font-bold mb-4">$79<span class="text-sm font-normal opacity-80">/month</span></div>
            <ul class="space-y-2 text-sm opacity-90">
              <li>✓ Up to 20 team members</li>
              <li>✓ 100 GB storage</li>
              <li>✓ Priority support</li>
            </ul>
          </div>
          <div class="p-6 bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700">
            <h3 class="text-xl font-bold mb-2 text-gray-900 dark:text-gray-100">Enterprise</h3>
            <div class="text-3xl font-bold mb-4 text-gray-900 dark:text-gray-100">Custom</div>
            <ul class="space-y-2 text-sm text-gray-600 dark:text-gray-400">
              <li>✓ Unlimited members</li>
              <li>✓ Unlimited storage</li>
              <li>✓ Dedicated support</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
