$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/metadata.schema.json
name: Button
status: stable
description: Versatile button component with multiple styles, sizes, and states. Supports both button and anchor link tags.
group: Forms
props:
  type: object
  properties:
    button_html_tag:
      type: string
      title: HTML Tag
      description: The HTML tag to use for the button (button | a). Defaults to button.
      default: button
      enum:
        - button
        - a
    url:
      type: string
      title: URL Link
      description: URL link for the button when the HTML tag is an anchor link.
    id:
      type: string
      title: ID
      description: The ID attribute of the button.
    color:
      type: string
      title: Color
      description: Button color scheme.
      default: primary
      enum:
        - primary
        - secondary
        - tertiary
        - success
        - warning
        - error
        - info
        - body
        - light
    outline:
      type: boolean
      title: Outline
      description: Use outline style instead of solid background.
      default: false
    size:
      type: string
      title: Size
      description: Button size variant.
      default: md
      enum:
        - sm
        - md
        - lg
        - xl
    disabled:
      type: boolean
      title: Disabled
      description: Disabled button state.
      default: false
    rounded:
      type: string
      title: Border Radius
      description: Button border radius. Note - Sharp edges (none) is the theme default.
      default: none
      enum:
        - none
        - sm
        - md
        - lg
        - xl
        - full
    button_utility_classes:
      type: array
      items:
        type: string
      title: Button Utility Classes
      description: Additional Tailwind utility classes.
      default: []
slots:
  content:
    title: Content
    description: The content for the button.

