$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: "Tailpine Grids"
status: stable
description: "The grid system of Tailwind CSS uses a series of utility classes for layouts and alignment of content. 'Grid cols' offers an off-the-shelf component to add a n-column configurable section. For more powerful needs, please refer to the Tailwind CSS documentation."
group: "Grid"
slots:
  items:
    title: items
    description: "The items to be displayed in the grid."
props:
  type: object
  properties:
    container_type:
      title: "Container type"
      description: "Utilities for controlling if container class is injected in the markup."
      type: string
      enum:
        - container mx-auto
        - breakout
        - bg-breakout
      "meta:enum":
        container mx-auto: "Container (default)"
        breakout: "Breakout"
        bg-breakout: "Bg breakout"

    background_image:
      title: Background image
      description: "The background image URL. Optional."
      type: string
      $ref: "ui-patterns://url"

    background_size:
      title: "Background size"
      description: "Utilities for controlling the background size of an element's background image."
      type: string
      enum:
        - bg-auto
        - bg-cover
        - bg-contain
      "meta:enum":
        bg-auto: "Background auto"
        bg-cover: "Background cover"
        bg-contain: "Background contain"

    background_color:
      title: "Background color"
      description: "Tailwind background color utility classes for setting section background."
      type: string
      enum:
        - bg-white
        - bg-gray-100
        - bg-gray-500
        - bg-blue-50
        - bg-blue-100
        - bg-primary
        - bg-secondary
        - bg-black
      "meta:enum":
        bg-white: "White"
        bg-gray-100: "Gray 100"
        bg-gray-200: "Gray 200"
        bg-blue-50: "Blue 50"
        bg-blue-100: "Blue 100"
        bg-primary: "Primary"
        bg-secondary: "Secondary"
        bg-black: "Black"
    gap:
      title: "Gap (mobile first)"
      description: "Utilities for controlling gutters between grid and flexbox items, for mobile first."
      type: integer
      enum:
        - 0
        - 2
        - 4
        - 8
        - 12
      "meta:enum":
        0: "0rem"
        2: "0.5rem"
        4: "1rem"
        8: "2rem"
        12: "3rem"
    gap_2xl:
      title: "Gap (2xl)"
      description: "Utilities for controlling gutters between grid and flexbox items, for '2xl' breakpoint."
      type: integer
      enum:
        - 0
        - 2
        - 4
        - 8
        - 12
      "meta:enum":
        0: "0rem"
        2: "0.5rem"
        4: "1rem"
        8: "2rem"
        12: "3rem"
