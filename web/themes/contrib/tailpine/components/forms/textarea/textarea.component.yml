$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Textarea
status: stable
group: Forms & Inputs
description: 'The textarea #type form element component.'
props:
  description: 'The properties accepted by the Textarea component.'
  type: object
  properties:
    resizable:
      type: ['null', 'string']
      description: An indicator for whether the textarea is resizable.
    required:
      type: ['null', 'boolean']
      description: An indicator for whether the textarea is required.
    value:
      description: 'The content of the textarea.'
      type: string
      title: 'Textarea Content'
      
