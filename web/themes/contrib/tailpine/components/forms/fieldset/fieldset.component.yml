$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Fieldset
status: stable
group: Forms & Inputs
description: SDC component for a fieldset form element.
props:
  type: object
  properties:
    errors:
      type: ['array', 'string', 'null']
      description: (optional) Any errors for this fieldset element, may not be set.
    required:
      type: ['null', 'boolean']
      description: Boolean indicating whether the fieldset element is required.
    legend:
      type: ['array', 'string', 'null']
      description: The description element containing the content & attributes properties
    description:
      type: ['array', 'string', 'null']
      description: 'The description element containing the attributes & content properties:'
    prefix:
      type: ['array', 'string', 'null']
      description: The content to add before the fieldset children.
    suffix:
      type: ['array', 'string', 'null']
      description: The content to add after the fieldset children.
    disabled:
      type: ['null', 'boolean']
      description: Boolean indicating whether the fieldset element is disabled.

slots:
  children:
    type: string
    description: The rendered child elements of the fieldset.
