$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Input
status: stable
group: Forms & Inputs
description: An <input> form element component.
props:
  type: object
  properties:
    type:
      type: string
      description: Input type (text, email, password, etc.)
    name:
      type: string
      description: Name attribute for the input
    value:
      type: string
      description: Value of the input
    placeholder:
      type: string
      description: Placeholder text
slots:
  children:
    type: array
    description: Optional additional rendered elements.

