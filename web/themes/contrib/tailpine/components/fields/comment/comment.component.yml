$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
status: stable
name: Comment
description: A component for rendering a comment field, including comments and a comment form.
props:
  type: object
  properties:
    label_hidden:
      type: boolean
      description: Whether the field label is hidden.
    title_attributes:
      type: [string, 'null']
      description: HTML attributes for the title.
    label:
      type: [string, 'null']
      description: The label for the field.
    title_prefix:
      type: [string, 'null']
      description: Additional output to display before the title.
    title_suffix:
      type: [string, 'null']
      description: Additional output to display after the title.
    comments:
      type: [string, 'null']
      description: List of comments rendered through comment.html.twig.
    comment_form:
      type: [string, 'null']
      description: The 'Add new comment' form.
    field_name:
      type: [string, 'null']
      description: The name of the field.
    field_type:
      type: [string, 'null']
      description: The type of the field.
    label_display:
      type: [string, 'null']
      description: The display settings for the label.