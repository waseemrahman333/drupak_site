name: Button Group - Toolbar Actions
description: Toolbar with common editing actions

slots:
  buttons:
    - type: component
      component: "tailpine:button"
      slots:
        content: "Bold"
      props:
        color: body
        size: sm
        outline: true
    - type: component
      component: "tailpine:button"
      slots:
        content: "Italic"
