        color: body
        size: sm
        outline: true
    - type: component
      component: "tailpine:button"
      slots:
        content: "Underline"
      props:
        color: body
        size: sm
        outline: true
    - type: component
      component: "tailpine:button"
      slots:
        content: "Link"
      props:
        color: body
        size: sm
        outline: true

