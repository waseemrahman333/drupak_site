$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/metadata.schema.json
name: Offcanvas
status: stable
description: Off-canvas sidebar panel with overlay.
group: Navigation
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      description: Offcanvas panel title.
    position:
      type: string
