$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: filter tips
status: stable
props:
  type: object
  properties:
    format:
      type: array
      description: Descriptions and a CSS ID in the form of 'module-name/filter-id' (only used when 'long' is TRUE) for each filter in one or more text formats.
    tips:
      type: ['array', 'string', 'null']
      description: Descriptions and a CSS ID in the form of 'module-name/filter-id'
