$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: View Grid Responsive
description: A component to render views in a grid layout.
group: "View"
status: stable

props:
  type: object
  properties:
    attributes:
      type: Drupal\Core\Template\Attribute   # change the from object to  Attribute type  #
      description: HTML attributes for the wrapping element.
    title:
      type: string
      description: The title of this group of rows.
    # items:
    #   type: string    # change the from array to string  #
    #   description: A list of grid items. Each item contains a list of rows or columns.
    #   items:
    #     type: array
    #     properties:
    #       attributes:
    #         type: object
    #         description: HTML attributes for each row or column.
    #       content:
    #         type: array
    #         items:
    #           type: object
    #           properties:
    #             attributes:
    #               type: object
    #               description: HTML attributes for each row or column.
    #             content:
    #               type: string
    #               description: The row or column contents.
    options:
      type: object
      description: The view plugin style options.
      properties:
        alignment:
          type: string
          description: The alignment of the grid ('horizontal' or 'vertical').
        columns:
          type: integer
          description: Number of columns in the grid.
        row_class_default:
          type: boolean
          description: Flag indicating whether default classes should be used on rows.
        col_class_default:
          type: boolean
          description: Flag indicating whether default classes should be used on columns.

slots:
  items:
    title: Items
    description: A list of grid items.
